<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="120" height="120" role="img">
  <rect x="1" y="1" width="98" height="98" rx="14" fill="#ffffff" stroke="#e2e6ea" stroke-width="1.5"/>
  <defs>
    <linearGradient id="stopg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9467bd" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#9467bd" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <!-- shaded stop region after second threshold -->
  <rect x="72" y="20" width="14" height="62" fill="url(#stopg)"/>

  <!-- axes -->
  <line x1="20" y1="82" x2="88" y2="82" stroke="#555" stroke-width="1"/>
  <line x1="20" y1="18" x2="20" y2="82" stroke="#555" stroke-width="1"/>
  <!-- x ticks -->
  <line x1="32" y1="82" x2="32" y2="85" stroke="#555" stroke-width="1"/>
  <line x1="44" y1="82" x2="44" y2="85" stroke="#555" stroke-width="1"/>
  <line x1="56" y1="82" x2="56" y2="85" stroke="#555" stroke-width="1"/>
  <line x1="68" y1="82" x2="68" y2="85" stroke="#555" stroke-width="1"/>
  <line x1="80" y1="82" x2="80" y2="85" stroke="#555" stroke-width="1"/>
  <!-- y ticks -->
  <line x1="17" y1="70" x2="20" y2="70" stroke="#555" stroke-width="1"/>
  <line x1="17" y1="55" x2="20" y2="55" stroke="#555" stroke-width="1"/>
  <line x1="17" y1="40" x2="20" y2="40" stroke="#555" stroke-width="1"/>
  <line x1="17" y1="25" x2="20" y2="25" stroke="#555" stroke-width="1"/>

  <!-- magenta acquisition curve alpha decreasing toward 0 -->
  <path d="M22,26 C30,30 36,46 44,58 C52,68 60,76 88,80" fill="none" stroke="#d62728" stroke-width="3" stroke-linecap="round"/>
  <circle cx="22" cy="26" r="2" fill="#d62728"/>
  <circle cx="34" cy="40" r="2" fill="#d62728"/>
  <circle cx="44" cy="58" r="2" fill="#d62728"/>
  <circle cx="56" cy="71" r="2" fill="#d62728"/>
  <circle cx="68" cy="77" r="2" fill="#d62728"/>
  <circle cx="80" cy="79.5" r="2" fill="#d62728"/>

  <!-- blue rising step curve (running min / best-observed) -->
  <path d="M22,74 L32,74 L32,62 L44,62 L44,52 L56,52 L56,44 L68,44 L68,38 L80,38 L80,34 L88,34" fill="none" stroke="#1f77b4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="30.5" y="60.5" width="3" height="3" fill="#1f77b4"/>
  <rect x="42.5" y="50.5" width="3" height="3" fill="#1f77b4"/>
  <rect x="54.5" y="42.5" width="3" height="3" fill="#1f77b4"/>
  <rect x="66.5" y="36.5" width="3" height="3" fill="#1f77b4"/>

  <!-- two vertical dashed threshold lines -->
  <line x1="52" y1="20" x2="52" y2="82" stroke="#2ca02c" stroke-width="1.6" stroke-dasharray="3 2.5"/>
  <line x1="72" y1="20" x2="72" y2="82" stroke="#ff7f0e" stroke-width="1.6" stroke-dasharray="3 2.5"/>

  <!-- kappa badges as colored squares -->
  <rect x="48.5" y="20" width="7" height="7" rx="1.5" fill="#2ca02c" stroke="#1d6b1d" stroke-width="0.8"/>
  <rect x="68.5" y="20" width="7" height="7" rx="1.5" fill="#ff7f0e" stroke="#b85c00" stroke-width="0.8"/>
</svg>
