<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="120" height="120" role="img">
  <rect x="1" y="1" width="98" height="98" rx="14" fill="#ffffff" stroke="#e2e6ea" stroke-width="1.5"/>
  <defs>
    <linearGradient id="cylBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#cfd3d8"/>
      <stop offset="0.32" stop-color="#f4f6f8"/>
      <stop offset="0.7" stop-color="#dce0e4"/>
      <stop offset="1" stop-color="#bcc1c7"/>
    </linearGradient>
    <linearGradient id="cylTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfcfd"/>
      <stop offset="1" stop-color="#d3d7dc"/>
    </linearGradient>
  </defs>

  <!-- soft shadow under scaffolds -->
  <ellipse cx="40" cy="80" rx="24" ry="4" fill="#9aa0a6" fill-opacity="0.22"/>

  <!-- ===== back / smaller cylinder ===== -->
  <path d="M50 38 L62 38 L62 70 Q56 74 50 70 Z" fill="url(#cylBody)" stroke="#a7adb4" stroke-width="0.8"/>
  <ellipse cx="56" cy="38" rx="6" ry="2.4" fill="url(#cylTop)" stroke="#a7adb4" stroke-width="0.8"/>
  <g fill="#7f868d" fill-opacity="0.85">
    <circle cx="53" cy="44" r="1" /><circle cx="57" cy="44" r="1"/><circle cx="60.5" cy="44" r="0.9"/>
    <circle cx="53" cy="50" r="1"/><circle cx="57" cy="50" r="1"/><circle cx="60.5" cy="50" r="0.9"/>
    <circle cx="53" cy="56" r="1"/><circle cx="57" cy="56" r="1"/><circle cx="60.5" cy="56" r="0.9"/>
    <circle cx="53" cy="62" r="1"/><circle cx="57" cy="62" r="1"/><circle cx="60.5" cy="62" r="0.9"/>
  </g>

  <!-- ===== front / main cylinder ===== -->
  <path d="M26 34 L46 34 L46 72 Q36 77 26 72 Z" fill="url(#cylBody)" stroke="#9aa0a6" stroke-width="1"/>
  <!-- top ellipse rim -->
  <ellipse cx="36" cy="34" rx="10" ry="3.6" fill="url(#cylTop)" stroke="#9aa0a6" stroke-width="1"/>
  <ellipse cx="36" cy="34" rx="6.5" ry="2.2" fill="#eef1f3" stroke="#b4b9bf" stroke-width="0.5"/>

  <!-- porous lattice holes: rows of small dark openings with highlights -->
  <g fill="#6e757c">
    <ellipse cx="30" cy="40" rx="1.5" ry="1.7"/><ellipse cx="36" cy="40" rx="1.5" ry="1.7"/><ellipse cx="42" cy="40" rx="1.4" ry="1.6"/>
    <ellipse cx="30" cy="47" rx="1.5" ry="1.7"/><ellipse cx="36" cy="47" rx="1.5" ry="1.7"/><ellipse cx="42" cy="47" rx="1.4" ry="1.6"/>
    <ellipse cx="30" cy="54" rx="1.5" ry="1.7"/><ellipse cx="36" cy="54" rx="1.5" ry="1.7"/><ellipse cx="42" cy="54" rx="1.4" ry="1.6"/>
    <ellipse cx="30" cy="61" rx="1.4" ry="1.6"/><ellipse cx="36" cy="61" rx="1.5" ry="1.7"/><ellipse cx="42" cy="61" rx="1.3" ry="1.5"/>
    <ellipse cx="30" cy="68" rx="1.3" ry="1.4"/><ellipse cx="36" cy="68" rx="1.4" ry="1.5"/><ellipse cx="42" cy="68" rx="1.2" ry="1.3"/>
  </g>
  <!-- tiny highlights inside holes for depth -->
  <g fill="#c9ced3" fill-opacity="0.8">
    <circle cx="29.4" cy="39.3" r="0.5"/><circle cx="35.4" cy="39.3" r="0.5"/>
    <circle cx="29.4" cy="46.3" r="0.5"/><circle cx="35.4" cy="46.3" r="0.5"/>
    <circle cx="29.4" cy="53.3" r="0.5"/><circle cx="35.4" cy="53.3" r="0.5"/>
  </g>

  <!-- specular highlight stripe on front cylinder -->
  <path d="M31 36 Q30 54 30.5 70" stroke="#ffffff" stroke-width="1.6" stroke-opacity="0.65" fill="none" stroke-linecap="round"/>

  <!-- ===== "hunch" prior: unimodal curve + monotonic trend arrow ===== -->
  <line x1="70" y1="76" x2="90" y2="76" stroke="#555" stroke-width="1"/>
  <line x1="70" y1="76" x2="70" y2="50" stroke="#555" stroke-width="1"/>
  <line x1="72" y1="74" x2="72" y2="76" stroke="#555" stroke-width="0.8"/>
  <line x1="80" y1="74" x2="80" y2="76" stroke="#555" stroke-width="0.8"/>
  <line x1="88" y1="74" x2="88" y2="76" stroke="#555" stroke-width="0.8"/>

  <!-- unimodal hunch curve with shaded region -->
  <path d="M71 74 Q80 48 89 74 Z" fill="#1f77b4" fill-opacity="0.18"/>
  <path d="M71 74 Q80 48 89 74" stroke="#1f77b4" stroke-width="2.6" fill="none" stroke-linecap="round"/>
  <circle cx="80" cy="55" r="1.6" fill="#d62728"/>

  <!-- monotonic trend arrow indicating incorporated prior knowledge -->
  <line x1="71" y1="68" x2="84" y2="55" stroke="#ff7f0e" stroke-width="2" stroke-linecap="round" stroke-dasharray="3 2"/>
  <path d="M84 55 L80.3 55.2 L82.6 58.2 Z" fill="#ff7f0e"/>
</svg>
