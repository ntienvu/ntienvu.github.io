  <circle cx="48" cy="67" r="1.4" fill="#1f77b4" fill-opacity="0.75"/>
  <circle cx="50" cy="61" r="1.4" fill="#1f77b4" fill-opacity="0.75"/>
  <circle cx="46" cy="59" r="1.4" fill="#1f77b4" fill-opacity="0.75"/>
  <circle cx="53" cy="64" r="1.4" fill="#1f77b4" fill-opacity="0.75"/>
