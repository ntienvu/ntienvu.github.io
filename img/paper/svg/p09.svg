<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="120" height="120" role="img">
  <rect x="1" y="1" width="98" height="98" rx="14" fill="#ffffff" stroke="#e2e6ea" stroke-width="1.5"/>
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b4a5a"/>
      <stop offset="1" stop-color="#2b3744"/>
    </linearGradient>
  </defs>

  <!-- data table grid -->
  <rect x="12" y="14" width="48" height="44" rx="2" fill="#ffffff" stroke="#9aa3ad" stroke-width="1.2"/>
  <!-- header row -->
  <rect x="12" y="14" width="48" height="9" rx="2" fill="url(#hdr)"/>
  <rect x="12" y="20" width="48" height="3" fill="url(#hdr)"/>
  <!-- column dividers -->
  <line x1="24" y1="14" x2="24" y2="58" stroke="#9aa3ad" stroke-width="0.8"/>
  <line x1="36" y1="14" x2="36" y2="58" stroke="#9aa3ad" stroke-width="0.8"/>
  <line x1="48" y1="14" x2="48" y2="58" stroke="#9aa3ad" stroke-width="0.8"/>
  <!-- row dividers -->
  <line x1="12" y1="23" x2="60" y2="23" stroke="#9aa3ad" stroke-width="0.8"/>
  <line x1="12" y1="32" x2="60" y2="32" stroke="#9aa3ad" stroke-width="0.8"/>
  <line x1="12" y1="40" x2="60" y2="40" stroke="#9aa3ad" stroke-width="0.8"/>
  <line x1="12" y1="49" x2="60" y2="49" stroke="#9aa3ad" stroke-width="0.8"/>

  <!-- header marks -->
  <rect x="15" y="17.5" width="6" height="2" rx="1" fill="#cfd6dd"/>
  <rect x="27" y="17.5" width="6" height="2" rx="1" fill="#cfd6dd"/>
  <rect x="39" y="17.5" width="6" height="2" rx="1" fill="#cfd6dd"/>
  <rect x="51" y="17.5" width="6" height="2" rx="1" fill="#cfd6dd"/>

  <!-- filled data cells (gray value bars) -->
  <rect x="15" y="26.5" width="6" height="2" rx="1" fill="#aab2bb"/>
  <rect x="39" y="26.5" width="6" height="2" rx="1" fill="#aab2bb"/>
  <rect x="51" y="26.5" width="6" height="2" rx="1" fill="#aab2bb"/>
  <rect x="27" y="35" width="6" height="2" rx="1" fill="#aab2bb"/>
  <rect x="51" y="35" width="6" height="2" rx="1" fill="#aab2bb"/>
  <rect x="15" y="43.5" width="6" height="2" rx="1" fill="#aab2bb"/>
  <rect x="27" y="43.5" width="6" height="2" rx="1" fill="#aab2bb"/>
  <rect x="39" y="43.5" width="6" height="2" rx="1" fill="#aab2bb"/>
  <rect x="15" y="52.5" width="6" height="2" rx="1" fill="#aab2bb"/>
  <rect x="39" y="52.5" width="6" height="2" rx="1" fill="#aab2bb"/>
  <rect x="51" y="52.5" width="6" height="2" rx="1" fill="#aab2bb"/>

  <!-- empty (missing) cells, dashed red -->
  <rect x="25" y="24" width="10" height="7" fill="#fdeceb" stroke="#d62728" stroke-width="0.9" stroke-dasharray="2 1.4"/>
  <rect x="37" y="33" width="10" height="7" fill="#fdeceb" stroke="#d62728" stroke-width="0.9" stroke-dasharray="2 1.4"/>
  <rect x="49" y="41" width="10" height="7" fill="#fdeceb" stroke="#d62728" stroke-width="0.9" stroke-dasharray="2 1.4"/>
  <rect x="25" y="50" width="10" height="7" fill="#fdeceb" stroke="#d62728" stroke-width="0.9" stroke-dasharray="2 1.4"/>

  <!-- diffusion denoising arrow strip -->
  <line x1="14" y1="74" x2="80" y2="74" stroke="#555" stroke-width="1"/>
  <polygon points="80,74 75.5,72 75.5,76" fill="#555"/>

  <!-- denoising cell sequence: noisy -> cleaner -> clean blue value -->
  <rect x="16" y="66" width="13" height="13" rx="1.5" fill="#eef1f4" stroke="#9aa3ad" stroke-width="0.8"/>
  <rect x="33" y="66" width="13" height="13" rx="1.5" fill="#eef1f4" stroke="#9aa3ad" stroke-width="0.8"/>
  <rect x="50" y="66" width="13" height="13" rx="1.5" fill="#eef1f4" stroke="#9aa3ad" stroke-width="0.8"/>
  <rect x="67" y="66" width="13" height="13" rx="1.5" fill="#1f77b4" stroke="#155a8a" stroke-width="0.9"/>
  <rect x="70.5" y="71.5" width="6" height="2.2" rx="1" fill="#ffffff"/>

  <!-- heavy noise in cell 1 -->
  <circle cx="19" cy="69" r="0.8" fill="#555"/><circle cx="23" cy="70.5" r="0.8" fill="#555"/>
  <circle cx="26.5" cy="68.5" r="0.8" fill="#555"/><circle cx="20.5" cy="73" r="0.8" fill="#555"/>
  <circle cx="24.5" cy="75" r="0.8" fill="#555"/><circle cx="27" cy="73.5" r="0.8" fill="#555"/>
  <circle cx="22" cy="76.5" r="0.8" fill="#555"/><circle cx="18" cy="75.5" r="0.8" fill="#555"/>
  <!-- medium noise in cell 2 -->
  <circle cx="37" cy="70" r="0.7" fill="#888"/><circle cx="41" cy="69" r="0.7" fill="#888"/>
  <circle cx="43" cy="73.5" r="0.7" fill="#888"/><circle cx="38" cy="75" r="0.7" fill="#888"/>
  <circle cx="42" cy="76" r="0.7" fill="#888"/>
  <!-- light noise in cell 3 -->
  <circle cx="55" cy="71" r="0.6" fill="#b8c0c8"/><circle cx="59" cy="73" r="0.6" fill="#b8c0c8"/>
  <circle cx="56.5" cy="75" r="0.6" fill="#b8c0c8"/>

  <!-- arrow from clean value up into a missing cell -->
  <path d="M73 65 C72 60 60 50 56 47.5" fill="none" stroke="#2ca02c" stroke-width="1.6" stroke-linecap="round"/>
  <polygon points="55,47 58.6,47.4 56.6,50.4" fill="#2ca02c"/>

  <!-- scattered fine diffusion noise dots -->
  <circle cx="66" cy="22" r="0.6" fill="#c2c9d0"/><circle cx="70" cy="30" r="0.6" fill="#c2c9d0"/>
  <circle cx="64" cy="38" r="0.6" fill="#c2c9d0"/><circle cx="72" cy="45" r="0.6" fill="#c2c9d0"/>
  <circle cx="84" cy="60" r="0.6" fill="#c2c9d0"/><circle cx="86" cy="36" r="0.6" fill="#c2c9d0"/>
  <circle cx="82" cy="26" r="0.6" fill="#c2c9d0"/><circle cx="76" cy="55" r="0.6" fill="#c2c9d0"/>
</svg>
