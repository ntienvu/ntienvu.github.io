<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="120" height="120" role="img">
  <rect x="1" y="1" width="98" height="98" rx="14" fill="#ffffff" stroke="#e2e6ea" stroke-width="1.5"/>
  <defs>
    <linearGradient id="anom" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2ca02c" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#2ca02c" stop-opacity="0.12"/>
    </linearGradient>
  </defs>

  <!-- scene ground -->
  <rect x="12" y="12" width="76" height="76" rx="3" fill="#eef3ec"/>

  <!-- roads forming an intersection -->
  <rect x="12" y="40" width="76" height="20" fill="#9aa1a8"/>
  <rect x="40" y="12" width="20" height="76" fill="#9aa1a8"/>
  <rect x="40" y="40" width="20" height="20" fill="#a7aeb5"/>

  <!-- horizontal dashed center line -->
  <line x1="14" y1="50" x2="22" y2="50" stroke="#f4d03f" stroke-width="1.4"/>
  <line x1="26" y1="50" x2="34" y2="50" stroke="#f4d03f" stroke-width="1.4"/>
  <line x1="66" y1="50" x2="74" y2="50" stroke="#f4d03f" stroke-width="1.4"/>
  <line x1="78" y1="50" x2="86" y2="50" stroke="#f4d03f" stroke-width="1.4"/>

  <!-- vertical dashed center line -->
  <line x1="50" y1="14" x2="50" y2="22" stroke="#f4d03f" stroke-width="1.4"/>
  <line x1="50" y1="26" x2="50" y2="34" stroke="#f4d03f" stroke-width="1.4"/>
  <line x1="50" y1="66" x2="50" y2="74" stroke="#f4d03f" stroke-width="1.4"/>
  <line x1="50" y1="78" x2="50" y2="86" stroke="#f4d03f" stroke-width="1.4"/>

  <!-- crosswalk hints -->
  <line x1="43" y1="38" x2="43" y2="34" stroke="#ffffff" stroke-width="1"/>
  <line x1="46" y1="38" x2="46" y2="34" stroke="#ffffff" stroke-width="1"/>
  <line x1="49" y1="38" x2="49" y2="34" stroke="#ffffff" stroke-width="1"/>

  <!-- normal-traffic cars -->
  <rect x="16" y="43" width="7" height="4" rx="1" fill="#1f77b4"/>
  <rect x="30" y="53" width="7" height="4" rx="1" fill="#d62728"/>
  <rect x="44" y="16" width="4" height="7" rx="1" fill="#9467bd"/>
  <rect x="52" y="72" width="4" height="7" rx="1" fill="#ff7f0e"/>

  <!-- detected anomaly: green highlighted blob -->
  <path d="M58 62 C66 58 76 60 78 68 C80 76 72 82 64 80 C56 79 52 70 58 62 Z"
        fill="url(#anom)" stroke="#2ca02c" stroke-width="2" stroke-dasharray="3 2"/>

  <!-- anomalous vehicle inside blob -->
  <rect x="64" y="68" width="7" height="4" rx="1" fill="#2ca02c"/>

  <!-- faint abnormal motion-path trajectory -->
  <path d="M44 47 C50 52 56 58 66 69"
        fill="none" stroke="#2ca02c" stroke-width="2.2" stroke-linecap="round"
        stroke-opacity="0.55" stroke-dasharray="4 3"/>
  <!-- arrowhead -->
  <path d="M66 69 L61 67 L63 63 Z" fill="#2ca02c" fill-opacity="0.85"/>
</svg>
