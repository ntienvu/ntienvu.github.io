<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="120" height="120" role="img">
  <rect x="1" y="1" width="98" height="98" rx="14" fill="#ffffff" stroke="#e2e6ea" stroke-width="1.5"/>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c8d0d8"/>
      <stop offset="1" stop-color="#9aa4ad"/>
    </linearGradient>
  </defs>
  <!-- player window -->
  <rect x="14" y="16" width="72" height="58" rx="3" fill="#2b2f33" stroke="#555" stroke-width="1.5"/>
  <!-- video scene frame -->
  <rect x="18" y="20" width="64" height="36" rx="1.5" fill="url(#sky)"/>
  <!-- road -->
  <path d="M18 56 L82 56 L82 47 L46 38 L36 38 Z" fill="#7a8088"/>
  <path d="M40 56 L43 44 M52 56 L50 44 M64 56 L57 44" stroke="#e8eaec" stroke-width="1" stroke-dasharray="2 2"/>
  <!-- building block -->
  <rect x="20" y="28" width="16" height="18" fill="#b6bcc2" stroke="#8a9098" stroke-width="0.8"/>
  <rect x="22.5" y="31" width="3" height="3" fill="#6b7178"/>
  <rect x="27" y="31" width="3" height="3" fill="#6b7178"/>
  <rect x="31.5" y="31" width="3" height="3" fill="#6b7178"/>
  <rect x="22.5" y="36" width="3" height="3" fill="#6b7178"/>
  <rect x="27" y="36" width="3" height="3" fill="#6b7178"/>
  <rect x="31.5" y="36" width="3" height="3" fill="#6b7178"/>
  <!-- second building -->
  <rect x="68" y="24" width="12" height="22" fill="#a7adb4" stroke="#82888f" stroke-width="0.8"/>
  <rect x="70" y="27" width="2.5" height="3" fill="#6b7178"/>
  <rect x="74" y="27" width="2.5" height="3" fill="#6b7178"/>
  <rect x="70" y="32" width="2.5" height="3" fill="#6b7178"/>
  <rect x="74" y="32" width="2.5" height="3" fill="#6b7178"/>
  <!-- flagged object (figure) -->
  <ellipse cx="52" cy="51" rx="2" ry="1" fill="#3a3f44" opacity="0.5"/>
  <circle cx="52" cy="44" r="1.8" fill="#3a3f44"/>
  <rect x="50.6" y="45.5" width="2.8" height="5" rx="1" fill="#3a3f44"/>
  <!-- red bounding box around anomaly -->
  <rect x="47" y="40.5" width="10.5" height="12.5" fill="none" stroke="#d62728" stroke-width="1.6"/>
  <rect x="47" y="37.5" width="6" height="2.6" rx="0.6" fill="#d62728"/>
  <!-- timeline scrubber -->
  <rect x="18" y="60" width="64" height="3.4" rx="1.7" fill="#4a4f54"/>
  <rect x="18" y="60" width="34" height="3.4" rx="1.7" fill="#1f77b4"/>
  <!-- event ticks -->
  <rect x="33" y="59" width="1.4" height="5.4" rx="0.5" fill="#ff7f0e"/>
  <rect x="64" y="59" width="1.4" height="5.4" rx="0.5" fill="#ff7f0e"/>
  <!-- playhead -->
  <circle cx="52" cy="61.7" r="3" fill="#ffffff" stroke="#1f77b4" stroke-width="1.4"/>
  <!-- controls bar -->
  <path d="M22 68.5 L22 71.5 L24.6 70 Z" fill="#dfe3e7"/>
  <rect x="27" y="68.5" width="1.4" height="3" fill="#dfe3e7"/>
  <rect x="29.4" y="68.5" width="1.4" height="3" fill="#dfe3e7"/>
  <circle cx="78" cy="70" r="2" fill="none" stroke="#dfe3e7" stroke-width="1.2"/>
  <path d="M78 68.4 L78 70 L79.3 70.6" fill="none" stroke="#dfe3e7" stroke-width="1.1"/>
</svg>
