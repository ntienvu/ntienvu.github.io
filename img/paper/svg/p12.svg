<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="120" height="120" role="img">
  <rect x="1" y="1" width="98" height="98" rx="14" fill="#ffffff" stroke="#e2e6ea" stroke-width="1.5"/>
  <defs>
    <linearGradient id="band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f77b4" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#1f77b4" stop-opacity="0.12"/>
    </linearGradient>
  </defs>

  <!-- main axes -->
  <line x1="16" y1="82" x2="86" y2="82" stroke="#555" stroke-width="1"/>
  <line x1="16" y1="20" x2="16" y2="82" stroke="#555" stroke-width="1"/>
  <!-- x ticks -->
  <line x1="30" y1="82" x2="30" y2="84.5" stroke="#555" stroke-width="1"/>
  <line x1="44" y1="82" x2="44" y2="84.5" stroke="#555" stroke-width="1"/>
  <line x1="58" y1="82" x2="58" y2="84.5" stroke="#555" stroke-width="1"/>
  <line x1="72" y1="82" x2="72" y2="84.5" stroke="#555" stroke-width="1"/>
  <!-- y ticks -->
  <line x1="13.5" y1="68" x2="16" y2="68" stroke="#555" stroke-width="1"/>
  <line x1="13.5" y1="52" x2="16" y2="52" stroke="#555" stroke-width="1"/>
  <line x1="13.5" y1="36" x2="16" y2="36" stroke="#555" stroke-width="1"/>

  <!-- GP uncertainty band -->
  <path d="M16,58 C26,44 36,40 46,48 C56,56 66,40 86,30
           L86,46 C66,56 56,70 46,62 C36,54 26,58 16,70 Z"
        fill="url(#band)"/>

  <!-- GP mean curve -->
  <path d="M16,64 C26,50 36,49 46,55 C56,61 66,49 86,38"
        fill="none" stroke="#1f77b4" stroke-width="3" stroke-linecap="round"/>

  <!-- red sample observations -->
  <circle cx="24" cy="60" r="2.1" fill="#d62728"/>
  <circle cx="38" cy="50" r="2.1" fill="#d62728"/>
  <circle cx="52" cy="59" r="2.1" fill="#d62728"/>
  <circle cx="66" cy="50" r="2.1" fill="#d62728"/>
  <circle cx="78" cy="42" r="2.1" fill="#d62728"/>

  <!-- inset divergence ball (top-right corner) -->
  <rect x="60" y="22" width="26" height="22" rx="2.5" fill="#ffffff" stroke="#cdd3d8" stroke-width="0.9"/>
  <circle cx="73" cy="33" r="9.2" fill="none" stroke="#888" stroke-width="0.9" stroke-dasharray="2 1.6"/>
  <!-- inset baseline -->
  <line x1="63" y1="40" x2="83" y2="40" stroke="#777" stroke-width="0.7"/>
  <!-- nominal distribution (green) -->
  <path d="M64,40 C67,40 67.5,29 70,29 C72.5,29 73,40 76,40"
        fill="#2ca02c" fill-opacity="0.22" stroke="#2ca02c" stroke-width="1.4"/>
  <!-- shifted distribution (red, offset) -->
  <path d="M70,40 C73,40 73.5,30.5 76,30.5 C78.5,30.5 79,40 82,40"
        fill="#d62728" fill-opacity="0.20" stroke="#d62728" stroke-width="1.4"/>
</svg>
