<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="120" height="120" role="img">
  <rect x="1" y="1" width="98" height="98" rx="14" fill="#ffffff" stroke="#e2e6ea" stroke-width="1.5"/>

  <!-- axes -->
  <line x1="20" y1="20" x2="20" y2="80" stroke="#555" stroke-width="1"/>
  <line x1="20" y1="80" x2="82" y2="80" stroke="#555" stroke-width="1"/>
  <!-- x ticks -->
  <line x1="35.5" y1="80" x2="35.5" y2="82" stroke="#555" stroke-width="1"/>
  <line x1="51" y1="80" x2="51" y2="82" stroke="#555" stroke-width="1"/>
  <line x1="66.5" y1="80" x2="66.5" y2="82" stroke="#555" stroke-width="1"/>
  <line x1="82" y1="80" x2="82" y2="82" stroke="#555" stroke-width="1"/>
  <!-- y ticks -->
  <line x1="18" y1="65" x2="20" y2="65" stroke="#555" stroke-width="1"/>
  <line x1="18" y1="50" x2="20" y2="50" stroke="#555" stroke-width="1"/>
  <line x1="18" y1="35" x2="20" y2="35" stroke="#555" stroke-width="1"/>

  <!-- fan of 6 acquisition curves: peaking progressively higher, converging to 0 at right (x=82) -->
  <!-- l=0.1 lowest peak (red) -->
  <path d="M20,80 C26,76 31,72 35,72 C39,72 44,76 50,79 C58,80 74,80 82,80" fill="none" stroke="#d62728" stroke-width="2.6" stroke-linecap="round"/>
  <!-- l=0.15 (orange) -->
  <path d="M20,80 C26,73 31,66 36,66 C41,66 46,72 52,77 C60,80 74,80 82,80" fill="none" stroke="#ff7f0e" stroke-width="2.6" stroke-linecap="round"/>
  <!-- l=0.2 (magenta) -->
  <path d="M20,80 C27,69 33,58 39,58 C45,58 50,67 56,74 C64,79 75,80 82,80" fill="none" stroke="#e377c2" stroke-width="2.6" stroke-linecap="round"/>
  <!-- l=0.25 (purple) -->
  <path d="M20,79 C28,65 35,50 42,50 C49,50 53,62 59,71 C66,78 76,80 82,80" fill="none" stroke="#9467bd" stroke-width="2.6" stroke-linecap="round"/>
  <!-- l=0.3 (green) -->
  <path d="M20,79 C29,61 37,42 45,42 C53,42 57,58 63,69 C69,77 77,80 82,80" fill="none" stroke="#2ca02c" stroke-width="2.8" stroke-linecap="round"/>
  <!-- l=0.4 highest peak (cyan/teal) -->
  <path d="M20,78 C30,55 39,32 48,32 C57,32 60,52 66,66 C71,75 78,80 82,80" fill="none" stroke="#17becf" stroke-width="3" stroke-linecap="round"/>

  <!-- peak markers -->
  <circle cx="35" cy="72" r="1.3" fill="#d62728"/>
  <circle cx="48" cy="32" r="1.5" fill="#17becf"/>

  <!-- elastic length-scale colorbar (vertical, right side) -->
  <defs>
    <linearGradient id="lsbar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#d62728"/>
      <stop offset="0.2" stop-color="#ff7f0e"/>
      <stop offset="0.4" stop-color="#e377c2"/>
      <stop offset="0.6" stop-color="#9467bd"/>
      <stop offset="0.8" stop-color="#2ca02c"/>
      <stop offset="1" stop-color="#17becf"/>
    </linearGradient>
  </defs>
  <rect x="85" y="24" width="4" height="42" rx="1" fill="url(#lsbar)" stroke="#888" stroke-width="0.6"/>
  <line x1="89" y1="24" x2="90.5" y2="24" stroke="#888" stroke-width="0.6"/>
  <line x1="89" y1="45" x2="90.5" y2="45" stroke="#888" stroke-width="0.6"/>
  <line x1="89" y1="66" x2="90.5" y2="66" stroke="#888" stroke-width="0.6"/>
</svg>
