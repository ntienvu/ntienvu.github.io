<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="120" height="120" role="img">
  <rect x="1" y="1" width="98" height="98" rx="14" fill="#ffffff" stroke="#e2e6ea" stroke-width="1.5"/>

  <!-- ===== Document (left) ===== -->
  <rect x="11" y="20" width="20" height="26" rx="2" fill="#f4f5f7" stroke="#9aa0a6" stroke-width="1.2"/>
  <rect x="14" y="24" width="14" height="1.6" rx="0.8" fill="#b0b6bc"/>
  <rect x="14" y="27.5" width="11" height="1.6" rx="0.8" fill="#1f77b4"/>
  <rect x="14" y="31" width="14" height="1.6" rx="0.8" fill="#b0b6bc"/>
  <rect x="14" y="34.5" width="9" height="1.6" rx="0.8" fill="#d62728"/>
  <rect x="14" y="38" width="14" height="1.6" rx="0.8" fill="#b0b6bc"/>
  <rect x="14" y="41.5" width="12" height="1.6" rx="0.8" fill="#2ca02c"/>

  <!-- arrow doc -> bars -->
  <line x1="32" y1="33" x2="40" y2="33" stroke="#555" stroke-width="1.3"/>
  <path d="M40 33 L37 31.4 L37 34.6 Z" fill="#555"/>

  <!-- ===== Topic-proportion bar chart (middle) ===== -->
  <line x1="42" y1="24" x2="42" y2="46" stroke="#555" stroke-width="1"/>
  <line x1="42" y1="46" x2="56" y2="46" stroke="#555" stroke-width="1"/>
  <rect x="43.5" y="32" width="2.4" height="14" fill="#1f77b4"/>
  <rect x="47" y="27" width="2.4" height="19" fill="#d62728"/>
  <rect x="50.5" y="37" width="2.4" height="9" fill="#2ca02c"/>
  <rect x="54" y="34" width="2.4" height="12" fill="#ff7f0e"/>

  <!-- arrow bars -> scatter -->
  <line x1="58" y1="38" x2="66" y2="38" stroke="#555" stroke-width="1.3"/>
  <path d="M66 38 L63 36.4 L63 39.6 Z" fill="#555"/>

  <!-- ===== Scatter + regression (right) ===== -->
  <line x1="68" y1="22" x2="68" y2="50" stroke="#555" stroke-width="1"/>
  <line x1="68" y1="50" x2="90" y2="50" stroke="#555" stroke-width="1"/>
  <line x1="68" y1="44" x2="69.2" y2="44" stroke="#555" stroke-width="0.8"/>
  <line x1="68" y1="36" x2="69.2" y2="36" stroke="#555" stroke-width="0.8"/>
  <line x1="68" y1="28" x2="69.2" y2="28" stroke="#555" stroke-width="0.8"/>
  <line x1="74" y1="50" x2="74" y2="48.8" stroke="#555" stroke-width="0.8"/>
  <line x1="80" y1="50" x2="80" y2="48.8" stroke="#555" stroke-width="0.8"/>
  <line x1="86" y1="50" x2="86" y2="48.8" stroke="#555" stroke-width="0.8"/>

  <!-- confidence band -->
  <path d="M69 47 L88 25 L88 29 L69 51 Z" fill="#1f77b4" fill-opacity="0.18"/>
  <!-- regression line -->
  <line x1="69" y1="49" x2="88" y2="27" stroke="#1f77b4" stroke-width="2.5" stroke-linecap="round"/>
  <!-- data points -->
  <circle cx="71" cy="46" r="1.5" fill="#d62728"/>
  <circle cx="75" cy="44" r="1.5" fill="#d62728"/>
  <circle cx="77" cy="38" r="1.5" fill="#d62728"/>
  <circle cx="80" cy="36" r="1.5" fill="#d62728"/>
  <circle cx="83" cy="32" r="1.5" fill="#d62728"/>
  <circle cx="86" cy="29" r="1.5" fill="#d62728"/>

  <!-- ===== Confounder node + causal arrows ===== -->
  <circle cx="50" cy="62" r="5" fill="#9467bd" fill-opacity="0.25" stroke="#9467bd" stroke-width="1.4"/>
  <circle cx="50" cy="62" r="1.6" fill="#9467bd"/>
  <!-- causal arrow from confounder to regression plot -->
  <path d="M54 59 Q66 54 76 48" fill="none" stroke="#555" stroke-width="1.3"/>
  <path d="M76 48 L73.2 48.4 L74.7 51 Z" fill="#555"/>
  <!-- causal arrow from confounder to topic bars -->
  <path d="M46 60 Q43 55 41 50" fill="none" stroke="#555" stroke-width="1.3"/>
  <path d="M41 50 L40.6 53 L43.2 51.6 Z" fill="#555"/>
</svg>
