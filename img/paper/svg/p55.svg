<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="120" height="120" role="img">
  <rect x="1" y="1" width="98" height="98" rx="14" fill="#ffffff" stroke="#e2e6ea" stroke-width="1.5"/>
  <!-- Region landmass outline -->
  <path d="M22 26 C30 20 44 19 56 22 C68 24 78 30 80 42 C82 54 78 66 70 74 C60 82 46 84 36 80 C26 76 18 66 17 54 C16 42 16 32 22 26 Z"
        fill="#f3f6fa" stroke="#3a4654" stroke-width="2"/>
