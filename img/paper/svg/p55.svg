  <path d="M22 26 C30 20 44 19 50 22 L48 44 L20 46 C18 38 18 32 22 26 Z"
        fill="#1f77b4" fill-opacity="0.28" stroke="#3a4654" stroke-width="1.2"/>
  <path d="M50 22 C68 24 78 30 80 42 L60 48 L48 44 Z"
        fill="#ff7f0e" fill-opacity="0.28" stroke="#3a4654" stroke-width="1.2"/>
  <path d="M20 46 L48 44 L46 64 L24 66 C19 60 18 52 20 46 Z"
        fill="#2ca02c" fill-opacity="0.28" stroke="#3a4654" stroke-width="1.2"/>
  <path d="M48 44 L60 48 L62 66 L46 64 Z"
        fill="#9467bd" fill-opacity="0.28" stroke="#3a4654" stroke-width="1.2"/>
  <path d="M60 48 L80 42 C82 54 78 66 70 74 L62 66 Z"
        fill="#d62728" fill-opacity="0.24" stroke="#3a4654" stroke-width="1.2"/>
  <path d="M24 66 L46 64 L62 66 L70 74 C60 82 46 84 36 80 C28 77 24 72 24 66 Z"
        fill="#17becf" fill-opacity="0.26" stroke="#3a4654" stroke-width="1.2"/>
  <!-- State capital markers -->
  <circle cx="34" cy="33" r="1.6" fill="#1f77b4"/>
  <circle cx="64" cy="35" r="1.6" fill="#ff7f0e"/>
  <circle cx="33" cy="55" r="1.6" fill="#2ca02c"/>
  <circle cx="54" cy="56" r="1.6" fill="#9467bd"/>
  <circle cx="46" cy="73" r="1.6" fill="#17becf"/>
  <!-- Multilevel regression inset, bottom-right corner -->
  <rect x="56" y="60" width="30" height="26" rx="3" fill="#ffffff" stroke="#cfd6dd" stroke-width="1.2"/>
  <line x1="60" y1="82" x2="84" y2="82" stroke="#555" stroke-width="1"/>
  <line x1="60" y1="82" x2="60" y2="62" stroke="#555" stroke-width="1"/>
  <line x1="64" y1="82" x2="64" y2="84" stroke="#555" stroke-width="1"/>
  <line x1="72" y1="82" x2="72" y2="84" stroke="#555" stroke-width="1"/>
  <line x1="80" y1="82" x2="80" y2="84" stroke="#555" stroke-width="1"/>
  <!-- group level-lines (varying intercepts/slopes) -->
  <line x1="61" y1="76" x2="83" y2="68" stroke="#1f77b4" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="61" y1="79" x2="83" y2="73" stroke="#2ca02c" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="61" y1="73" x2="83" y2="64" stroke="#ff7f0e" stroke-width="1.6" stroke-linecap="round"/>
  <!-- pooled population regression line -->
  <line x1="61" y1="77" x2="83" y2="66" stroke="#d62728" stroke-width="2.2" stroke-linecap="round"/>
  <!-- data points -->
  <circle cx="66" cy="73" r="1" fill="#9467bd"/>
  <circle cx="73" cy="70" r="1" fill="#9467bd"/>
  <circle cx="79" cy="67" r="1" fill="#9467bd"/>
</svg>
