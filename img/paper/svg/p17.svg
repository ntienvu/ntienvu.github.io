<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="120" height="120" role="img">
  <rect x="1" y="1" width="98" height="98" rx="14" fill="#ffffff" stroke="#e2e6ea" stroke-width="1.5"/>

  <!-- branching arrows: generation 1 -> generation 2 -->
  <g stroke="#9aa3ab" stroke-width="1.2" fill="none">
    <path d="M24,30 C30,40 36,42 42,48"/>
    <path d="M24,30 C24,40 24,42 24,48"/>
    <path d="M48,30 C48,40 48,42 48,48"/>
    <path d="M72,30 C66,40 60,42 54,48"/>
    <path d="M72,30 C72,40 72,42 72,48"/>
  </g>
  <!-- branching arrows: generation 2 -> generation 3 -->
  <g stroke="#9aa3ab" stroke-width="1.2" fill="none">
    <path d="M24,54 C24,64 24,66 24,72"/>
    <path d="M48,54 C42,64 36,66 30,72"/>
    <path d="M48,54 C54,64 60,66 66,72"/>
    <path d="M72,54 C72,64 72,66 72,72"/>
  </g>

  <!-- arrowheads -->
  <g fill="#9aa3ab">
    <path d="M42,48 l-2.6,-1.4 l1.6,2.6 z"/>
    <path d="M24,48 l-1.4,-2.6 l-1.4,2.6 z"/>
    <path d="M48,48 l-1.4,-2.6 l-1.4,2.6 z"/>
    <path d="M54,48 l1,2.9 l1.6,-2.6 z"/>
    <path d="M72,48 l-1.4,-2.6 l-1.4,2.6 z"/>
    <path d="M24,72 l-1.4,-2.6 l-1.4,2.6 z"/>
    <path d="M30,72 l2.6,-1.4 l-1.6,2.6 z"/>
    <path d="M66,72 l-2.6,-1.4 l1.6,2.6 z"/>
    <path d="M72,72 l-1.4,-2.6 l-1.4,2.6 z"/>
  </g>

  <!-- GENERATION 1 (row 1, y=24) -->
  <circle cx="24" cy="24" r="5.5" fill="#f0f1f3" stroke="#9aa3ab" stroke-width="1.4" stroke-dasharray="2.5,2" opacity="0.7"/>
  <circle cx="48" cy="24" r="5.5" fill="#1f77b4" stroke="#155a86" stroke-width="1.2"/>
  <circle cx="72" cy="24" r="5.5" fill="#2ca02c" stroke="#1f7020" stroke-width="1.2"/>
  <rect x="55" y="20" width="2.4" height="8" rx="0.6" fill="#1f77b4"/>
  <rect x="79" y="17" width="2.4" height="11" rx="0.6" fill="#2ca02c"/>
  <rect x="31" y="24" width="2.4" height="4" rx="0.6" fill="#9aa3ab"/>

  <!-- GENERATION 2 (row 2, y=48) -->
  <circle cx="24" cy="48" r="5.5" fill="#1f77b4" stroke="#155a86" stroke-width="1.2"/>
  <circle cx="48" cy="48" r="5.5" fill="#ff7f0e" stroke="#b85a00" stroke-width="1.2"/>
  <circle cx="72" cy="48" r="5.5" fill="#f0f1f3" stroke="#9aa3ab" stroke-width="1.4" stroke-dasharray="2.5,2" opacity="0.7"/>
  <rect x="31" y="42" width="2.4" height="11" rx="0.6" fill="#1f77b4"/>
  <rect x="55" y="44" width="2.4" height="9" rx="0.6" fill="#ff7f0e"/>

  <!-- GENERATION 3 (row 3, y=72) -->
  <circle cx="24" cy="72" r="5.5" fill="#1f77b4" stroke="#155a86" stroke-width="1.2"/>
  <circle cx="48" cy="72" r="5.5" fill="#d62728" stroke="#8f1a1a" stroke-width="1.2"/>
  <circle cx="72" cy="72" r="5.5" fill="#9467bd" stroke="#5f3f80" stroke-width="1.2"/>
  <rect x="31" y="64" width="2.4" height="13" rx="0.6" fill="#1f77b4"/>
  <rect x="55" y="62" width="2.4" height="15" rx="0.6" fill="#d62728"/>
  <rect x="79" y="63" width="2.4" height="14" rx="0.6" fill="#9467bd"/>

  <!-- star marker on best elite -->
  <path d="M48,69.4 l0.9,1.9 l2.1,0.2 l-1.6,1.4 l0.5,2 l-1.9,-1.1 l-1.9,1.1 l0.5,-2 l-1.6,-1.4 l2.1,-0.2 z" fill="#ffffff"/>
