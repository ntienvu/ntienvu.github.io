<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="120" height="120" role="img">
  <rect x="1" y="1" width="98" height="98" rx="14" fill="#ffffff" stroke="#e2e6ea" stroke-width="1.5"/>
  <defs>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dceefb"/>
      <stop offset="1" stop-color="#a9cdec"/>
    </linearGradient>
    <radialGradient id="dot" cx="0.35" cy="0.32" r="0.8">
      <stop offset="0" stop-color="#ffe28a"/>
      <stop offset="0.6" stop-color="#f4b942"/>
      <stop offset="1" stop-color="#c8881f"/>
    </radialGradient>
  </defs>

  <!-- chip substrate -->
  <rect x="18" y="18" width="64" height="64" rx="10" fill="url(#chip)" stroke="#5e87a8" stroke-width="1.5"/>
  <rect x="24" y="24" width="52" height="52" rx="7" fill="#cfe6f8" fill-opacity="0.5" stroke="#7ba6c6" stroke-width="0.8"/>

  <!-- gray gate electrodes (top + sides) tapered bars pointing inward -->
  <polygon points="38,16 46,16 44,40 40,40" fill="#9aa0a6" stroke="#6c7176" stroke-width="0.8"/>
  <polygon points="54,16 62,16 60,40 56,40" fill="#9aa0a6" stroke="#6c7176" stroke-width="0.8"/>
  <polygon points="14,40 14,48 38,46 38,42" fill="#9aa0a6" stroke="#6c7176" stroke-width="0.8"/>
  <polygon points="86,40 86,48 62,46 62,42" fill="#9aa0a6" stroke="#6c7176" stroke-width="0.8"/>

  <!-- purple controlled gates (bottom, angled tapered bars) -->
  <polygon points="36,84 44,84 46,60 42,60" fill="#9467bd" stroke="#6d4c93" stroke-width="0.9"/>
  <polygon points="56,84 64,84 58,60 54,60" fill="#9467bd" stroke="#6d4c93" stroke-width="0.9"/>

  <!-- minus mark beside left purple gate -->
  <line x1="29" y1="74" x2="34" y2="74" stroke="#d62728" stroke-width="1.6" stroke-linecap="round"/>
  <!-- plus mark beside right purple gate -->
  <line x1="66" y1="71" x2="71" y2="71" stroke="#2ca02c" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="68.5" y1="68.5" x2="68.5" y2="73.5" stroke="#2ca02c" stroke-width="1.6" stroke-linecap="round"/>

  <!-- two gold quantum dots -->
  <circle cx="43" cy="50" r="7.5" fill="url(#dot)" stroke="#9c6a16" stroke-width="1"/>
  <circle cx="57" cy="50" r="7.5" fill="url(#dot)" stroke="#9c6a16" stroke-width="1"/>
  <ellipse cx="41" cy="47.5" rx="2.4" ry="1.6" fill="#fff3cf" fill-opacity="0.8"/>
  <ellipse cx="55" cy="47.5" rx="2.4" ry="1.6" fill="#fff3cf" fill-opacity="0.8"/>

  <!-- curved current arrow between the dots -->
  <path d="M46 50 C48.5 45.5 51.5 45.5 54 50" fill="none" stroke="#1f77b4" stroke-width="2" stroke-linecap="round"/>
  <polygon points="54,50 51,48.4 51.5,51.6" fill="#1f77b4"/>
</svg>
