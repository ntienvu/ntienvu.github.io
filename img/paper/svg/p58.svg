<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="120" height="120" role="img">
  <rect x="1" y="1" width="98" height="98" rx="14" fill="#ffffff" stroke="#e2e6ea" stroke-width="1.5"/>
  <defs>
    <linearGradient id="valbar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#9edae5"/>
      <stop offset="1" stop-color="#1f9fb4"/>
    </linearGradient>
  </defs>

  <!-- axes -->
  <line x1="16" y1="18" x2="16" y2="80" stroke="#555" stroke-width="1"/>
  <line x1="16" y1="80" x2="88" y2="80" stroke="#555" stroke-width="1"/>
  <!-- x ticks (time steps) -->
  <line x1="28" y1="80" x2="28" y2="83" stroke="#555" stroke-width="0.9"/>
  <line x1="40" y1="80" x2="40" y2="83" stroke="#555" stroke-width="0.9"/>
  <line x1="52" y1="80" x2="52" y2="83" stroke="#555" stroke-width="0.9"/>
  <line x1="64" y1="80" x2="64" y2="83" stroke="#555" stroke-width="0.9"/>
  <line x1="76" y1="80" x2="76" y2="83" stroke="#555" stroke-width="0.9"/>
  <!-- y ticks -->
  <line x1="13" y1="32" x2="16" y2="32" stroke="#555" stroke-width="0.9"/>
  <line x1="13" y1="48" x2="16" y2="48" stroke="#555" stroke-width="0.9"/>
  <line x1="13" y1="64" x2="16" y2="64" stroke="#555" stroke-width="0.9"/>

  <!-- per-segment value bars (data valuation) -->
  <rect x="20" y="62" width="11" height="18" fill="url(#valbar)" opacity="0.55"/>
  <rect x="32" y="50" width="11" height="30" fill="url(#valbar)" opacity="0.55"/>
  <rect x="44" y="40" width="11" height="40" fill="url(#valbar)" opacity="0.55"/>
  <rect x="56" y="56" width="11" height="24" fill="url(#valbar)" opacity="0.55"/>
  <rect x="68" y="46" width="11" height="34" fill="url(#valbar)" opacity="0.55"/>

  <!-- time series signal (orange) -->
  <path d="M18 58 L24 46 L30 52 L36 36 L42 44 L48 28 L54 50 L60 40 L66 54 L72 38 L78 48 L84 34"
        fill="none" stroke="#ff7f0e" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- sample markers on signal -->
  <circle cx="24" cy="46" r="1.8" fill="#ff7f0e"/>
  <circle cx="36" cy="36" r="1.8" fill="#ff7f0e"/>
  <circle cx="48" cy="28" r="2.2" fill="#d62728" stroke="#fff" stroke-width="0.8"/>
  <circle cx="60" cy="40" r="1.8" fill="#ff7f0e"/>
  <circle cx="72" cy="38" r="1.8" fill="#ff7f0e"/>

  <!-- highlight high-value segment with a star marker above the tallest bar -->
  <path d="M49.5 18 l1.4 3 l3.3 0.3 l-2.5 2.2 l0.8 3.2 l-2.9 -1.7 l-2.9 1.7 l0.8 -3.2 l-2.5 -2.2 l3.3 -0.3 z"
        fill="#f4b942" stroke="#c8881f" stroke-width="0.6"/>
</svg>
