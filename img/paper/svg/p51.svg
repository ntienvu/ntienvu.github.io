<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="120" height="120" role="img">
  <rect x="1" y="1" width="98" height="98" rx="14" fill="#ffffff" stroke="#e2e6ea" stroke-width="1.5"/>

  <!-- community halos -->
  <ellipse cx="28" cy="30" rx="16" ry="14" fill="#1f77b4" fill-opacity="0.12"/>
  <ellipse cx="68" cy="28" rx="15" ry="13" fill="#d62728" fill-opacity="0.12"/>
  <ellipse cx="50" cy="58" rx="16" ry="12" fill="#2ca02c" fill-opacity="0.12"/>

  <!-- intra-cluster edges: blue -->
  <line x1="22" y1="22" x2="35" y2="26" stroke="#1f77b4" stroke-width="1.6"/>
  <line x1="22" y1="22" x2="26" y2="38" stroke="#1f77b4" stroke-width="1.6"/>
  <line x1="35" y1="26" x2="26" y2="38" stroke="#1f77b4" stroke-width="1.6"/>
  <line x1="35" y1="26" x2="20" y2="33" stroke="#1f77b4" stroke-width="1.6"/>

  <!-- intra-cluster edges: red -->
  <line x1="62" y1="20" x2="76" y2="24" stroke="#d62728" stroke-width="1.6"/>
  <line x1="62" y1="20" x2="66" y2="34" stroke="#d62728" stroke-width="1.6"/>
  <line x1="76" y1="24" x2="66" y2="34" stroke="#d62728" stroke-width="1.6"/>

  <!-- intra-cluster edges: green -->
  <line x1="42" y1="54" x2="56" y2="54" stroke="#2ca02c" stroke-width="1.6"/>
  <line x1="42" y1="54" x2="50" y2="64" stroke="#2ca02c" stroke-width="1.6"/>
  <line x1="56" y1="54" x2="50" y2="64" stroke="#2ca02c" stroke-width="1.6"/>

  <!-- inter-cluster bridges (dashed gray) -->
  <line x1="26" y1="38" x2="42" y2="54" stroke="#888" stroke-width="1.4" stroke-dasharray="2.5,2.5"/>
  <line x1="66" y1="34" x2="56" y2="54" stroke="#888" stroke-width="1.4" stroke-dasharray="2.5,2.5"/>
  <line x1="35" y1="26" x2="62" y2="20" stroke="#888" stroke-width="1.4" stroke-dasharray="2.5,2.5"/>

  <!-- blue nodes -->
  <circle cx="22" cy="22" r="3.4" fill="#1f77b4" stroke="#13496e" stroke-width="0.8"/>
  <circle cx="35" cy="26" r="3.4" fill="#1f77b4" stroke="#13496e" stroke-width="0.8"/>
  <circle cx="26" cy="38" r="3.4" fill="#1f77b4" stroke="#13496e" stroke-width="0.8"/>
  <circle cx="20" cy="33" r="3" fill="#1f77b4" stroke="#13496e" stroke-width="0.8"/>

  <!-- red nodes -->
  <circle cx="62" cy="20" r="3.4" fill="#d62728" stroke="#7c1718" stroke-width="0.8"/>
  <circle cx="76" cy="24" r="3.4" fill="#d62728" stroke="#7c1718" stroke-width="0.8"/>
  <circle cx="66" cy="34" r="3.4" fill="#d62728" stroke="#7c1718" stroke-width="0.8"/>

  <!-- green nodes -->
  <circle cx="42" cy="54" r="3.4" fill="#2ca02c" stroke="#185e18" stroke-width="0.8"/>
  <circle cx="56" cy="54" r="3.4" fill="#2ca02c" stroke="#185e18" stroke-width="0.8"/>
  <circle cx="50" cy="64" r="3.4" fill="#2ca02c" stroke="#185e18" stroke-width="0.8"/>

  <!-- context strip along bottom -->
  <rect x="14" y="80" width="13" height="8" rx="1.5" fill="#1f77b4"/>
  <rect x="27" y="80" width="9" height="8" rx="1.5" fill="#ff7f0e"/>
  <rect x="36" y="80" width="14" height="8" rx="1.5" fill="#2ca02c"/>
  <rect x="50" y="80" width="10" height="8" rx="1.5" fill="#9467bd"/>
  <rect x="60" y="80" width="12" height="8" rx="1.5" fill="#d62728"/>
  <rect x="72" y="80" width="14" height="8" rx="1.5" fill="#17becf"/>
  <rect x="14" y="80" width="72" height="8" rx="1.5" fill="none" stroke="#555" stroke-width="0.8"/>
</svg>
