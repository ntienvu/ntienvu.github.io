<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="120" height="120" role="img">
  <rect x="1" y="1" width="98" height="98" rx="14" fill="#ffffff" stroke="#e2e6ea" stroke-width="1.5"/>

  <!-- highlighted unexplored region -->
  <rect x="62" y="20" width="22" height="58" fill="#2ca02c" fill-opacity="0.10" rx="2"/>

  <!-- axes -->
  <line x1="18" y1="78" x2="86" y2="78" stroke="#555" stroke-width="1"/>
  <line x1="18" y1="20" x2="18" y2="78" stroke="#555" stroke-width="1"/>
  <!-- x ticks -->
  <line x1="30" y1="78" x2="30" y2="81" stroke="#555" stroke-width="1"/>
  <line x1="44" y1="78" x2="44" y2="81" stroke="#555" stroke-width="1"/>
  <line x1="58" y1="78" x2="58" y2="81" stroke="#555" stroke-width="1"/>
  <line x1="72" y1="78" x2="72" y2="81" stroke="#555" stroke-width="1"/>
  <!-- y ticks -->
  <line x1="18" y1="66" x2="15" y2="66" stroke="#555" stroke-width="1"/>
  <line x1="18" y1="52" x2="15" y2="52" stroke="#555" stroke-width="1"/>
  <line x1="18" y1="38" x2="15" y2="38" stroke="#555" stroke-width="1"/>

  <!-- shaded area beneath EI curve -->
  <path d="M18,78 L18,70 C24,62 28,42 34,42 C40,42 42,66 48,68 C54,70 56,52 62,40 C66,32 70,24 76,30 C80,34 82,58 86,66 L86,78 Z"
        fill="#1f77b4" fill-opacity="0.22"/>

  <!-- EI curve -->
  <path d="M18,70 C24,62 28,42 34,42 C40,42 42,66 48,68 C54,70 56,52 62,40 C66,32 70,24 76,30 C80,34 82,58 86,66"
        fill="none" stroke="#1f77b4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- current best marker (left main peak) -->
  <line x1="34" y1="42" x2="34" y2="78" stroke="#888" stroke-width="0.8" stroke-dasharray="2,2"/>
  <circle cx="34" cy="42" r="2.6" fill="#ffffff" stroke="#1f77b4" stroke-width="1.6"/>

  <!-- red evaluated points along axis -->
  <circle cx="26" cy="78" r="2" fill="#d62728"/>
  <circle cx="34" cy="78" r="2" fill="#d62728"/>
  <circle cx="48" cy="78" r="2" fill="#d62728"/>
  <circle cx="54" cy="78" r="2" fill="#d62728"/>

  <!-- exploration bump star marker -->
  <path d="M75,25 l1.1,2.5 l2.7,0.2 l-2.1,1.8 l0.7,2.6 l-2.3,-1.4 l-2.3,1.4 l0.7,-2.6 l-2.1,-1.8 l2.7,-0.2 Z"
        fill="#ff7f0e" stroke="#cc6600" stroke-width="0.5"/>

  <!-- exploration arrow pointing to the rising bump -->
  <path d="M50,30 C58,24 64,24 70,26" fill="none" stroke="#2ca02c" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M70,26 l-4.6,-1.4 l1.6,4.6 Z" fill="#2ca02c"/>
</svg>
