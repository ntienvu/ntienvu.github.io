  <!-- red samples -->
  <circle cx="64" cy="60" r="1.8" fill="#d62728"/>
  <circle cx="70" cy="48" r="1.8" fill="#d62728"/>
  <circle cx="80" cy="46" r="1.8" fill="#d62728"/>
  <circle cx="87" cy="51" r="1.8" fill="#d62728"/>

