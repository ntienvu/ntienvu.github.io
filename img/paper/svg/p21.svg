  <!-- per-participant dial -->
  <circle cx="46" cy="76" r="8" fill="#f3f4f6" stroke="#9467bd" stroke-width="1.4"/>
  <line x1="46" y1="76" x2="51" y2="72" stroke="#9467bd" stroke-width="1.6" stroke-linecap="round"/>
  <circle cx="46" cy="76" r="1.4" fill="#9467bd"/>
  <line x1="46" y1="69" x2="46" y2="70.6" stroke="#9467bd" stroke-width="0.9"/>
