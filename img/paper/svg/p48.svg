<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="120" height="120" role="img">
  <rect x="1" y="1" width="98" height="98" rx="14" fill="#ffffff" stroke="#e2e6ea" stroke-width="1.5"/>

  <!-- axes -->
  <line x1="18" y1="20" x2="18" y2="80" stroke="#555" stroke-width="1"/>
  <line x1="18" y1="80" x2="86" y2="80" stroke="#555" stroke-width="1"/>
  <!-- y ticks -->
  <line x1="15.5" y1="32" x2="18" y2="32" stroke="#555" stroke-width="1"/>
  <line x1="15.5" y1="50" x2="18" y2="50" stroke="#555" stroke-width="1"/>
  <line x1="15.5" y1="68" x2="18" y2="68" stroke="#555" stroke-width="1"/>
  <!-- x ticks -->
  <line x1="32" y1="80" x2="32" y2="82.5" stroke="#555" stroke-width="1"/>
  <line x1="50" y1="80" x2="50" y2="82.5" stroke="#555" stroke-width="1"/>
  <line x1="68" y1="80" x2="68" y2="82.5" stroke="#555" stroke-width="1"/>
  <line x1="84" y1="80" x2="84" y2="82.5" stroke="#555" stroke-width="1"/>

  <!-- threshold line -->
  <line x1="18" y1="50" x2="86" y2="50" stroke="#d62728" stroke-width="1.2" stroke-dasharray="3 2"/>

  <!-- acquisition curve fill -->
  <path d="M18,78 C24,76 26,34 33,30 C40,26 44,72 50,73 C57,74 60,46 67,44 C74,42 80,76 86,77 L86,80 L18,80 Z"
        fill="#1f77b4" fill-opacity="0.18"/>
  <!-- acquisition curve: tall peak left, shorter peak right -->
  <path d="M18,78 C24,76 26,34 33,30 C40,26 44,72 50,73 C57,74 60,46 67,44 C74,42 80,76 86,77"
        fill="none" stroke="#1f77b4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- left peak stem + base marker (ACCEPTED) -->
  <line x1="33" y1="80" x2="33" y2="30" stroke="#d62728" stroke-width="1" stroke-dasharray="2 2"/>
  <circle cx="33" cy="80" r="2.4" fill="#d62728"/>
  <!-- accepted: green check dot at peak top -->
  <circle cx="33" cy="30" r="4.2" fill="#2ca02c"/>
  <path d="M30.8,30 l1.6,1.8 l3,-3.6" fill="none" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- right peak stem + base marker (REJECTED, below threshold) -->
  <line x1="67" y1="80" x2="67" y2="44" stroke="#d62728" stroke-width="1" stroke-dasharray="2 2"/>
  <circle cx="67" cy="80" r="2.4" fill="#d62728"/>
  <!-- rejected: red x at peak top -->
  <line x1="64.6" y1="41.6" x2="69.4" y2="46.4" stroke="#d62728" stroke-width="2" stroke-linecap="round"/>
  <line x1="69.4" y1="41.6" x2="64.6" y2="46.4" stroke="#d62728" stroke-width="2" stroke-linecap="round"/>
</svg>
