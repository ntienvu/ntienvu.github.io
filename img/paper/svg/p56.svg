<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="120" height="120" role="img">
  <rect x="1" y="1" width="98" height="98" rx="14" fill="#ffffff" stroke="#e2e6ea" stroke-width="1.5"/>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="7.5" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#4a525a"/>
    </marker>
  </defs>

  <!-- outer plate: group level (repeated over J groups) -->
  <rect x="13" y="22" width="74" height="60" rx="4" fill="#f4f7fb" stroke="#9aa6b2" stroke-width="1.4"/>
  <!-- inner plate: within-group observations (repeated over N_j) -->
  <rect x="36" y="44" width="46" height="33" rx="4" fill="#e8eef6" stroke="#9aa6b2" stroke-width="1.4"/>

  <!-- directed edges -->
  <g stroke="#4a525a" stroke-width="1.4" fill="none" marker-end="url(#ah)">
    <line x1="22" y1="21" x2="29" y2="29"/>
    <line x1="34" y1="20" x2="34" y2="29"/>
    <line x1="36" y1="38" x2="46" y2="51"/>
    <line x1="60" y1="20" x2="60" y2="29"/>
    <line x1="58" y1="38" x2="56" y2="49"/>
    <line x1="56" y1="59" x2="64" y2="62"/>
  </g>

  <!-- hyperparameter node (outside plates, top-left) -->
  <circle cx="20" cy="18" r="4.5" fill="#ffffff" stroke="#555c63" stroke-width="1.4"/>
  <!-- group Dirichlet prior node (open, top) -->
  <circle cx="34" cy="16" r="4.5" fill="#ffffff" stroke="#555c63" stroke-width="1.4"/>
  <!-- context prior node (open, top-right) -->
  <circle cx="60" cy="16" r="4.5" fill="#ffffff" stroke="#555c63" stroke-width="1.4"/>

  <!-- KEY latent node J (filled blue) -->
  <circle cx="33" cy="34" r="6.5" fill="#1f77b4" stroke="#16567f" stroke-width="1.3"/>
  <!-- group context node (shaded) -->
  <circle cx="60" cy="34" r="6" fill="#cfd8e3" stroke="#6b7785" stroke-width="1.3"/>

  <!-- KEY latent node N_j (filled blue, inner plate) -->
  <circle cx="50" cy="55" r="6.5" fill="#1f77b4" stroke="#16567f" stroke-width="1.3"/>
  <!-- observed data node (shaded gray, inner plate) -->
  <circle cx="68" cy="65" r="6.5" fill="#9aa6b2" stroke="#5c6670" stroke-width="1.3"/>
</svg>
