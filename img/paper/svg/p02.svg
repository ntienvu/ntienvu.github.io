  <path d="M49 36 L46.5 31 L51.5 31 Z" fill="#2ca02c"/>

  <!-- Personalized parameter dial -->
  <circle cx="28" cy="76" r="8" fill="#f3f5f8" stroke="#555" stroke-width="1.2"/>
  <line x1="28" y1="76" x2="32.5" y2="71.5" stroke="#9467bd" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="28" cy="76" r="1.6" fill="#9467bd"/>
  <line x1="28" y1="69.5" x2="28" y2="71" stroke="#555" stroke-width="1"/>
  <line x1="34.5" y1="76" x2="33" y2="76" stroke="#555" stroke-width="1"/>
  <line x1="21.5" y1="76" x2="23" y2="76" stroke="#555" stroke-width="1"/>

  <!-- +/- current marks -->
