<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="120" height="120" role="img">
  <rect x="1" y="1" width="98" height="98" rx="14" fill="#ffffff" stroke="#e2e6ea" stroke-width="1.5"/>
  <defs>
    <linearGradient id="brainG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffc4d6"/>
      <stop offset="1" stop-color="#e87a9a"/>
    </linearGradient>
    <linearGradient id="skinG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f6e6d8"/>
      <stop offset="1" stop-color="#ecd4bf"/>
