  </defs>

  <!-- Head: side profile facing left -->
  <path d="M70 22 C56 14 36 16 28 30 C22 40 21 46 18 52 C16 56 18 59 22 60 C23 64 22 68 26 70 C30 73 30 78 34 80 C44 86 60 86 70 80 C80 73 84 60 84 46 C84 34 80 28 70 22 Z"
