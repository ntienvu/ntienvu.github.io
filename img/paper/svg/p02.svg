  <path d="M18 52 C16 56 18 59 22 60 L25 60 C24 56 23 54 24 52 Z" fill="#f6e6d8" stroke="#caa988" stroke-width="1"/>

  <!-- Brain -->
  <path d="M64 30 C52 25 38 28 33 38 C30 44 31 49 35 53 C32 58 36 63 42 63 C50 66 62 64 68 57 C74 50 74 38 64 30 Z"
        fill="url(#brainG)" stroke="#c25c7c" stroke-width="1.4"/>
  <path d="M40 36 C45 40 43 46 48 49" fill="none" stroke="#c25c7c" stroke-width="1.1" stroke-linecap="round"/>
  <path d="M52 33 C56 38 53 44 58 48" fill="none" stroke="#c25c7c" stroke-width="1.1" stroke-linecap="round"/>
  <path d="M37 47 C42 49 44 54 50 55" fill="none" stroke="#c25c7c" stroke-width="1.1" stroke-linecap="round"/>
  <path d="M60 36 C64 41 62 47 65 51" fill="none" stroke="#c25c7c" stroke-width="1.1" stroke-linecap="round"/>

