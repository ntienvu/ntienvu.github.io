  <rect x="68" y="34" width="6" height="13" rx="3" fill="#d62728" stroke="#8f1b1b" stroke-width="1"/>

  <!-- Lead wires -->
  <path d="M48 18 C46 12 60 10 64 13" fill="none" stroke="#555" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M74 40 C82 38 84 30 80 24" fill="none" stroke="#555" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Stimulation concentric arcs into cortex -->
  <path d="M44 26 C47 29 51 29 54 26" fill="none" stroke="#ff7f0e" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M42 29 C47 33 51 33 56 29" fill="none" stroke="#ff7f0e" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
  <path d="M40 32 C47 37 51 37 58 32" fill="none" stroke="#ff7f0e" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>

