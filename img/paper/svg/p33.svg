<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="120" height="120" role="img">
  <rect x="1" y="1" width="98" height="98" rx="14" fill="#ffffff" stroke="#e2e6ea" stroke-width="1.5"/>
  <defs>
    <radialGradient id="nuc33" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#ffd86b"/>
      <stop offset="100%" stop-color="#ff7f0e"/>
    </radialGradient>
  </defs>

  <!-- ===== Quantum device (atom) lower-left ===== -->
  <ellipse cx="32" cy="64" rx="17" ry="6.5" fill="none" stroke="#17becf" stroke-width="2" transform="rotate(28 32 64)"/>
  <ellipse cx="32" cy="64" rx="17" ry="6.5" fill="none" stroke="#17becf" stroke-width="2" transform="rotate(-28 32 64)"/>
  <circle cx="32" cy="64" r="5.2" fill="url(#nuc33)" stroke="#d4690a" stroke-width="1"/>
  <!-- electrons on orbits -->
  <circle cx="44.5" cy="56.5" r="2.1" fill="#1f77b4" stroke="#11507e" stroke-width="0.6"/>
  <circle cx="20" cy="72" r="2.1" fill="#1f77b4" stroke="#11507e" stroke-width="0.6"/>
  <circle cx="45" cy="71.5" r="2.1" fill="#2ca02c" stroke="#1c6b1c" stroke-width="0.6"/>

  <!-- ===== Agent box upper-left ===== -->
  <rect x="14" y="18" width="24" height="15" rx="3" fill="#eef3ff" stroke="#1f77b4" stroke-width="1.6"/>
  <circle cx="20.5" cy="25.5" r="1.7" fill="#1f77b4"/>
  <circle cx="26" cy="25.5" r="1.7" fill="#9467bd"/>
  <circle cx="31.5" cy="25.5" r="1.7" fill="#d62728"/>
  <line x1="20.5" y1="25.5" x2="26" y2="25.5" stroke="#7a8aa0" stroke-width="0.8"/>
  <line x1="26" y1="25.5" x2="31.5" y2="25.5" stroke="#7a8aa0" stroke-width="0.8"/>

  <!-- ===== Action arrow: agent -> device ===== -->
  <path d="M22 33.5 C16 42, 18 50, 25 58" fill="none" stroke="#d62728" stroke-width="2.4" stroke-linecap="round"/>
  <polygon points="25,58 21.3,53.6 27.3,53.2" fill="#d62728"/>

  <!-- ===== State/reward arrow: device -> agent ===== -->
  <path d="M44 58 C52 50, 50 40, 40 33.5" fill="none" stroke="#2ca02c" stroke-width="2.4" stroke-linecap="round"/>
  <polygon points="40,33.5 44.8,35.6 41,39.2" fill="#2ca02c"/>

  <!-- ===== Reward curve panel (right) ===== -->
  <line x1="62" y1="78" x2="62" y2="40" stroke="#555" stroke-width="1"/>
  <line x1="62" y1="78" x2="90" y2="78" stroke="#555" stroke-width="1"/>
  <line x1="62" y1="70" x2="64" y2="70" stroke="#555" stroke-width="1"/>
  <line x1="62" y1="58" x2="64" y2="58" stroke="#555" stroke-width="1"/>
  <line x1="62" y1="46" x2="64" y2="46" stroke="#555" stroke-width="1"/>
  <line x1="70" y1="78" x2="70" y2="76" stroke="#555" stroke-width="1"/>
  <line x1="80" y1="78" x2="80" y2="76" stroke="#555" stroke-width="1"/>
  <!-- band -->
  <path d="M62 72 C70 66, 78 50, 90 44 L90 50 C78 56, 70 70, 62 75 Z" fill="#9467bd" fill-opacity="0.22"/>
  <!-- rising reward curve -->
  <path d="M62 73.5 C70 69, 76 52, 90 46.5" fill="none" stroke="#9467bd" stroke-width="3" stroke-linecap="round"/>
  <circle cx="62" cy="73.5" r="1.6" fill="#9467bd"/>
  <circle cx="76" cy="56.5" r="1.6" fill="#9467bd"/>
  <circle cx="90" cy="46.5" r="1.6" fill="#9467bd"/>
</svg>
