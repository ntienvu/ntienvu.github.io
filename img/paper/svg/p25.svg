<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="120" height="120" role="img">
  <rect x="1" y="1" width="98" height="98" rx="14" fill="#ffffff" stroke="#e2e6ea" stroke-width="1.5"/>
  <defs>
    <linearGradient id="surfL" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#1f4e79"/>
      <stop offset="0.55" stop-color="#1f77b4"/>
      <stop offset="1" stop-color="#9ecae1"/>
    </linearGradient>
    <linearGradient id="surfR" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#17456b"/>
      <stop offset="0.55" stop-color="#2b88c8"/>
      <stop offset="1" stop-color="#c6dbef"/>
    </linearGradient>
  </defs>

  <!-- 3D axes (faint) -->
  <line x1="20" y1="78" x2="84" y2="64" stroke="#aaaaaa" stroke-width="1"/>
  <line x1="20" y1="78" x2="34" y2="86" stroke="#aaaaaa" stroke-width="1"/>
  <line x1="20" y1="78" x2="20" y2="22" stroke="#aaaaaa" stroke-width="1"/>

  <!-- Surface base patches (peaked ridge) -->
  <path d="M20 70 C30 58 38 40 48 34 C56 30 62 36 70 44 C76 50 82 56 84 60 L84 64 C76 60 68 56 62 54 C54 52 48 56 40 62 C32 68 26 72 20 74 Z"
        fill="url(#surfL)" stroke="#15527e" stroke-width="0.8"/>
  <path d="M48 34 C56 30 62 36 70 44 C76 50 82 56 84 60 L84 52 C80 46 74 40 70 36 C64 30 58 28 52 30 C50 31 49 33 48 34 Z"
        fill="url(#surfR)" stroke="#15527e" stroke-width="0.8"/>

  <!-- Second peak lower-front -->
  <path d="M26 72 C32 66 38 58 44 56 C50 54 54 60 58 66 C54 68 50 70 44 70 C36 70 30 72 26 74 Z"
        fill="url(#surfR)" stroke="#15527e" stroke-width="0.6" fill-opacity="0.9"/>

  <!-- Wireframe mesh lines (down the slopes) -->
  <path d="M22 72 C32 64 40 50 48 36" fill="none" stroke="#cfe3f2" stroke-width="0.7" stroke-opacity="0.8"/>
  <path d="M30 74 C40 64 48 50 56 40" fill="none" stroke="#cfe3f2" stroke-width="0.7" stroke-opacity="0.8"/>
  <path d="M40 74 C50 64 58 52 66 44" fill="none" stroke="#cfe3f2" stroke-width="0.7" stroke-opacity="0.8"/>
  <path d="M52 70 C60 62 68 54 76 50" fill="none" stroke="#cfe3f2" stroke-width="0.7" stroke-opacity="0.7"/>
  <!-- cross mesh -->
  <path d="M22 72 C34 70 48 64 62 54 C72 47 80 56 84 60" fill="none" stroke="#bcd8ee" stroke-width="0.6" stroke-opacity="0.7"/>
  <path d="M28 64 C40 58 50 46 60 40 C68 35 76 42 80 50" fill="none" stroke="#bcd8ee" stroke-width="0.6" stroke-opacity="0.7"/>
  <path d="M34 54 C42 48 50 40 56 36" fill="none" stroke="#bcd8ee" stroke-width="0.6" stroke-opacity="0.6"/>

  <!-- Global max red star at tallest peak -->
  <path d="M48 28 L49.6 32 L54 32.4 L50.7 35.2 L51.8 39.5 L48 37.1 L44.2 39.5 L45.3 35.2 L42 32.4 L46.4 32 Z"
        fill="#d62728" stroke="#9e1a1a" stroke-width="0.5"/>

  <!-- Local trust-region box (magnified local) on surface -->
  <rect x="58" y="56" width="14" height="11" fill="#ff7f0e" fill-opacity="0.18" stroke="#ff7f0e" stroke-width="1.2" rx="1"/>
  <path d="M59 64 C62 60 66 60 71 58" fill="none" stroke="#ff7f0e" stroke-width="1" stroke-opacity="0.9"/>
  <circle cx="65" cy="61" r="1.3" fill="#ff7f0e"/>
  <line x1="58" y1="56" x2="62" y2="50" stroke="#ff7f0e" stroke-width="0.7" stroke-dasharray="2 1.5"/>
  <line x1="72" y1="56" x2="70" y2="48" stroke="#ff7f0e" stroke-width="0.7" stroke-dasharray="2 1.5"/>

  <!-- sample dots scattered on surface (global exploration) -->
  <circle cx="34" cy="60" r="1.1" fill="#2ca02c"/>
  <circle cx="44" cy="50" r="1.1" fill="#2ca02c"/>
  <circle cx="60" cy="48" r="1.1" fill="#2ca02c"/>
  <circle cx="74" cy="54" r="1.1" fill="#2ca02c"/>
</svg>
