<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="120" height="120" role="img">
  <rect x="1" y="1" width="98" height="98" rx="14" fill="#ffffff" stroke="#e2e6ea" stroke-width="1.5"/>
  <defs>
    <linearGradient id="val" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#d62728"/>
      <stop offset="0.5" stop-color="#ff7f0e"/>
      <stop offset="1" stop-color="#2ca02c"/>
    </linearGradient>
  </defs>

  <!-- transport lines (drawn first, behind) -->
  <g stroke="#9aa3ab" stroke-width="1" opacity="0.8">
    <line x1="28" y1="32" x2="68" y2="40"/>
    <line x1="22" y1="48" x2="68" y2="46"/>
    <line x1="33" y1="60" x2="69" y2="52"/>
    <line x1="26" y1="68" x2="68" y2="58"/>
    <line x1="38" y1="44" x2="68" y2="45"/>
  </g>

  <!-- noisy training batches (dashed rounded boxes) -->
  <rect x="16" y="24" width="26" height="22" rx="5" fill="#1f77b4" fill-opacity="0.07" stroke="#1f77b4" stroke-width="1" stroke-dasharray="3 2"/>
  <rect x="18" y="50" width="26" height="22" rx="5" fill="#1f77b4" fill-opacity="0.07" stroke="#1f77b4" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- noisy training cloud (scattered blue dots) -->
  <g fill="#1f77b4">
    <circle cx="21" cy="29" r="1.8"/>
    <circle cx="28" cy="32" r="1.8"/>
    <circle cx="35" cy="28" r="1.8"/>
    <circle cx="38" cy="35" r="1.8"/>
    <circle cx="24" cy="38" r="1.8"/>
    <circle cx="31" cy="41" r="1.8"/>
    <circle cx="22" cy="48" r="1.8"/>
    <circle cx="29" cy="54" r="1.8"/>
    <circle cx="37" cy="52" r="1.8"/>
    <circle cx="33" cy="60" r="1.8"/>
    <circle cx="40" cy="58" r="1.8"/>
    <circle cx="26" cy="68" r="1.8"/>
    <circle cx="35" cy="66" r="1.8"/>
    <circle cx="20" cy="60" r="1.8"/>
    <circle cx="42" cy="44" r="1.8"/>
  </g>
  <!-- a few noisy outliers (red dots) -->
  <g fill="#d62728" opacity="0.85">
    <circle cx="44" cy="30" r="1.6"/>
    <circle cx="17" cy="55" r="1.6"/>
    <circle cx="43" cy="65" r="1.6"/>
  </g>

  <!-- clean validation batch box -->
  <rect x="62" y="36" width="16" height="26" rx="5" fill="#2ca02c" fill-opacity="0.08" stroke="#2ca02c" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- clean validation cluster (tidy green) -->
  <g fill="#2ca02c">
    <circle cx="67" cy="41" r="2"/>
    <circle cx="73" cy="40" r="2"/>
    <circle cx="65" cy="47" r="2"/>
    <circle cx="71" cy="47" r="2"/>
    <circle cx="75" cy="50" r="2"/>
    <circle cx="68" cy="53" r="2"/>
    <circle cx="73" cy="57" r="2"/>
  </g>

  <!-- value colorbar -->
  <rect x="84" y="30" width="5" height="38" rx="1.5" fill="url(#val)" stroke="#555" stroke-width="0.6"/>
  <g stroke="#555" stroke-width="0.7">
    <line x1="84" y1="36" x2="86" y2="36"/>
    <line x1="84" y1="46" x2="86" y2="46"/>
    <line x1="84" y1="56" x2="86" y2="56"/>
    <line x1="84" y1="66" x2="86" y2="66"/>
  </g>

  <!-- arrow from training toward validation -->
  <line x1="46" y1="78" x2="60" y2="78" stroke="#555" stroke-width="1.2"/>
  <polygon points="60,78 56,76 56,80" fill="#555"/>
</svg>
